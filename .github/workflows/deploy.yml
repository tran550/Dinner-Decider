name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd Dinner-Decider
            git pull
            sudo docker build -t dinner-decider .
            sudo docker stop dinner-decider || true
            sudo docker rm dinner-decider || true
            sudo docker run -d \
              --name dinner-decider \
              -p 5000:5000 \
              -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
              -e UNSPLASH_KEY="${{ secrets.UNSPLASH_KEY }}" \
              dinner-decider
